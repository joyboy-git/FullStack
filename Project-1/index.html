<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TechStore - Mobiles & Laptops</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>
  <header>
    <div class="container">
      <div class="header-content">
        <h1 class="logo">TechStore</h1>
        <div class="search-container">
          <input type="text" id="searchInput" placeholder="Search for products..." />
          <button id="searchBtn">Search</button>
        </div>
        <button id="cartBtn" class="cart-btn">
          🛒
          <span id="cartCount" class="cart-count">0</span>
        </button>

      </div>
    </div>
  </header>

  <main class="container">
    <div class="filter-section">
      <button class="filter-btn active" data-category="all">All Products</button>
      <button class="filter-btn" data-category="mobile">Mobiles</button>
      <button class="filter-btn" data-category="laptop">Laptops</button>
    </div>

    <div id="productsGrid" class="products-grid">
    </div>

    <div id="noResults" class="no-results" style="display: none">
      <p>No products found matching your search.</p>
    </div>
  </main>

  <div id="cartSidebar" class="cart-sidebar">
    <div class="cart-header">
      <h2>Shopping Cart</h2>
      <button id="closeCart" class="close-btn">&times;</button>
    </div>
    <div id="cartItems" class="cart-items">
    </div>
    <div class="cart-empty" id="cartEmpty">
      <p>Your cart is empty</p>
    </div>
    <div class="cart-footer" id="cartFooter" style="display: none">
      <div class="cart-summary">
        <div class="summary-row">
          <span>Subtotal:</span>
          <span id="subtotal">₹0</span>
        </div>
        <div class="summary-row">
          <span>GST (2.5%):</span>
          <span id="tax">₹0</span>
        </div>
        <div class="summary-row">
          <span>Delivery:</span>
          <span id="delivery">₹300</span>
        </div>
        <div class="summary-row total">
          <span>Total:</span>
          <span id="total">₹0</span>
        </div>
      </div>
      <button class="checkout-btn">Proceed to Checkout</button>
    </div>
  </div>

  <div id="overlay" class="overlay"></div>

  <script src="product.js"></script>
  <script src="script.js"></script>
</body>

</html>
